# Common parameters
# Support: 1 imu 1 cam; 1 imu 2 cam; 2 cam
imu_num: 1
cam_num: 1

imu_topic: "/imu0"
cam0_topic: "/cam0/image_raw"

# Imu parameters
# Noise standard deviation of accelerometer/gyroscope measurement and bias random walk
# acc_n: 0.1            # 0.2   0.04
# gyr_n: 0.01           # 0.05  0.004
# acc_w: 0.001          # 0.002
# gyr_w: 0.0001         # 4.0e-5
acc_n: 0.08
gyr_n: 0.004
acc_w: 0.00004
gyr_w: 2.0e-6

# Gravity magnitude
g_norm: 9.81007

# Image parameters
focal_length: 460.0

fisheye: false

cam0_calib: "cam0_pinhole.yaml"

pixel_n: 1.5  # reprojection noise (image pixels error for reprojection)

# Extrinsic parameter between imu and camera.
estimate_extrinsic: false   # true  -->  Have an initial guess about extrinsic parameters. We will optimize around your initial guess.
                            # false -->  Have an accurate extrinsic parameters. We will trust the following T_imu_cam0, T_imu_cam1 and will not change it.

T_imu_cam0: [0.0148655429818, -0.999880929698, 0.00414029679422, -0.0216401454975,
             0.999557249008, 0.0149672133247, 0.025715529948, -0.064676986768,
             -0.0257744366974, 0.00375618835797, 0.999660727178, 0.00981073058949,
             0.0, 0.0, 0.0, 1.0]

# Unsynchronization parameters
estimate_timedelay: false # true  --> online estimate time offset between camera and imu
                          # false --> offline given time offset between camera and imu
time_delay: 0.00          # initial value of time offset. unit: s. readed image clock + td = real image clock (IMU clock)

# Down sampling frequency
down_sampling_raw_image: 1    # guarantee tracking expense is NOT higher than raw image sampling interval
down_sampling_track_image: 2  # multi-thread implementation: guarantee processing expense is NOT higher than tracking expense
                              # single-thread implementation: guarantee processing and tracking expense is NOT higher than raw image sampling interval

# Feature traker paprameters
max_point_cnt: 150            # max feature number in feature tracking
min_line_cnt: 50              # line feature will be supplemented if there are too few lines in the image
min_dist: 30                  # min distance between two features
init_depth: 5.0

show_track: true           # publish tracking image as topic
flow_back: true            # perform forward and backward optical flow to improve feature tracking accuracy
lineflow_back: false        # perform forward and backward line optical flow to improve line feature tracking accuracy
equalize: true             # perform histogram equalization

# Optimization parameters
max_solver_time: 0.06   # max solver itration time (ms), to guarantee real time
max_num_iterations: 10   # max solver itrations, to guarantee real time
keyframe_parallax: 10.0 # keyframe selection threshold (pixel)


#loop closure parameters
load_previous_pose_graph: 0        # load and reuse previous pose graph; load from 'pose_graph_save_path'
save_image: 1                   # save image in pose graph for visualization prupose; you can close this function by setting 0 
